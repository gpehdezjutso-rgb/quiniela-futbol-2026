# render.yaml — Infrastructure as Code para Render.com
# Documentación: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: quiniela-mundial-2026
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon           # Región más cercana a México
    plan: starter            # $7/mes — 512 MB RAM, 0.5 CPU
    healthCheckPath: /       # Render verifica que la app responde en /
    autoDeploy: true         # Re-despliega automáticamente al hacer push

    envVars:
      # ── Base de datos ──────────────────────────────────────────────────────
      - key: DB_DRIVER
        value: org.postgresql.Driver
      - key: DB_URL
        fromDatabase:
          name: quiniela-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: quiniela-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: quiniela-db
          property: password

      # ── Hibernate ──────────────────────────────────────────────────────────
      - key: HIBERNATE_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: HIBERNATE_SHOW_SQL
        value: "false"
      - key: HIBERNATE_DDL_AUTO
        value: update

      # ── HikariCP ───────────────────────────────────────────────────────────
      - key: DB_POOL_MAX_SIZE
        value: "10"           # Conservador para plan Starter (Basic-256mb BD)
      - key: DB_POOL_MIN_IDLE
        value: "2"

databases:
  - name: quiniela-db
    databaseName: quiniela_db
    plan: basic-256mb        # $6/mes — suficiente para la quiniela
    region: oregon
