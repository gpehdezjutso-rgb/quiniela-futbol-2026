<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo}">Título por Defecto</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
            padding-top: 50px;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: inline-block;
            max-width: 500px;
        }
        h1 { color: #0066cc; }
        .badge {
            background-color: #28a745;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Thymeleaf renderiza dinámicamente los valores usando th:text -->
        <h1 th:text="${titulo}">Nombre de la aplicación</h1>
        <p th:text="${mensaje}">Mensaje de prueba</p>
        <span class="badge">Estructura Spring MVC + Thymeleaf OK</span>
    </div>

</body>
</html>
