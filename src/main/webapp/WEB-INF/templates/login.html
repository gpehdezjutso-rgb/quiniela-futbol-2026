        /* Overlay oscuro semitransparente para dar contraste al formulario */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 0;
        }

        /* ── TARJETA DE LOGIN ── */
        .login-card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 40px 36px;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
        }

        /* Logo pequeño en la tarjeta */
        .card-logo {
            width: 72px;
            height: 72px;
            object-fit: contain;
            border-radius: 10px;
            margin-bottom: 14px;
            opacity: 0.9;
        }

        .card-title {
            color: #ffffff;
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }

        .card-subtitle {
            color: rgba(255,255,255,0.55);
            font-size: 0.85rem;
            margin-bottom: 28px;
        }

        /* ── INPUTS ── */
        .form-group { margin-bottom: 16px; text-align: left; }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.82rem;
            font-weight: 600;
            color: rgba(255,255,255,0.75);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }

        input[type="email"]::placeholder,
        input[type="password"]::placeholder { color: rgba(255,255,255,0.35); }

        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.15);
        }

        /* ── BOTÓN ── */
        .btn-login {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            background: linear-gradient(135deg, #0066cc, #0044aa);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.4px;
            transition: opacity 0.2s, transform 0.1s;
        }
        .btn-login:hover  { opacity: 0.9; }
        .btn-login:active { transform: scale(0.98); }

        /* ── ALERTAS ── */
        .alert {
            padding: 10px 14px;
            border-radius: 7px;
            margin-bottom: 18px;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: left;
        }
        .alert-danger  { background: rgba(220,53,69,0.25);  color: #ffb3bb; border: 1px solid rgba(220,53,69,0.4);  }
        .alert-success { background: rgba(40,167,69,0.20);  color: #a3f0b5; border: 1px solid rgba(40,167,69,0.4);  }

        /* ── LINK REGISTRO ── */
        .register-link {
            margin-top: 22px;
            color: rgba(255,255,255,0.5);
            font-size: 0.85rem;
        }
        .register-link a {
            color: #5bc8ff;
            font-weight: 700;
            text-decoration: none;
        }
        .register-link a:hover { text-decoration: underline; }

        /* ── RESPONSIVO ── */
        @media (max-width: 440px) {
            .login-card { margin: 16px; padding: 30px 22px; }
        }
    </style>
</head>
